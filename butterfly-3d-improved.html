<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Improved Butterfly - Three.js</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0f7fc 0%, #d4e9f7 100%);
            overflow: hidden;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            min-width: 250px;
        }

        h1 {
            margin: 0 0 15px 0;
            font-size: 1.3rem;
            color: #1a1a1a;
        }

        .model-info {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .view-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 15px;
            background: #ff6b35;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #e85a2a;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .control-hint {
            font-size: 0.8rem;
            color: #999;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 16px;
            background: #1a1a1a;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .back-link:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="ui-panel">
        <h1>🦋 Improved Butterfly</h1>
        <div class="model-info">
            <strong>Style:</strong> Smooth rounded wings with proper proportions<br>
            <strong>Geometry:</strong> Multi-vertex approach
        </div>

        <div class="view-buttons">
            <button onclick="setView('front')">Front View</button>
            <button onclick="setView('side')">Side View</button>
            <button onclick="setView('top')">Top View</button>
            <button onclick="setView('quarter')">3/4 View</button>
        </div>

        <button onclick="resetPosition()" style="width: 100%;">Reset Position</button>

        <div class="control-hint">
            🖱️ <strong>Mouse Controls:</strong><br>
            • Left drag: Rotate<br>
            • Right drag: Pan<br>
            • Scroll: Zoom
        </div>

        <a href="test-all-variants.html" class="back-link">← Back to Test Page</a>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f7fc);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Orbit controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 5);
        directionalLight.castShadow = true;
        scene.add(directionalLight);

        const backLight = new THREE.DirectionalLight(0xffffff, 0.3);
        backLight.position.set(-5, 5, -5);
        scene.add(backLight);

        // Materials
        const wingMaterial = new THREE.MeshPhongMaterial({
            color: 0xff8c42,  // Monarch orange
            side: THREE.DoubleSide,
            shininess: 30,
            transparent: true,
            opacity: 0.95
        });

        const bodyMaterial = new THREE.MeshPhongMaterial({
            color: 0x1a1a1a,
            shininess: 50
        });

        // Create butterfly group
        const butterfly = new THREE.Group();

        // Create smooth butterfly wing with rounded edges using multiple vertices
        function createSmoothWing() {
            const shape = new THREE.Shape();

            // Start at body attachment - top
            shape.moveTo(0, 1.2);

            // Upper wing section - smooth rounded shape
            // Leading edge curves outward and upward
            shape.bezierCurveTo(
                0.8, 1.6,    // control point 1
                1.8, 2.2,    // control point 2
                2.8, 2.6     // end point
            );

            // Continue to apex - rounded top
            shape.bezierCurveTo(
                3.6, 2.9,    // control point 1
                4.2, 3.0,    // control point 2 (peak)
                4.6, 2.8     // end point (start coming down)
            );

            // Outer edge curves down
            shape.bezierCurveTo(
                4.8, 2.5,    // control point 1
                4.9, 2.0,    // control point 2
                4.8, 1.4     // end point
            );

            // Middle indent (where fore and hindwing meet)
            shape.bezierCurveTo(
                4.7, 0.8,    // control point 1
                4.5, 0.3,    // control point 2
                4.3, 0       // end point (middle)
            );

            // Lower wing section - curves back out
            shape.bezierCurveTo(
                4.5, -0.4,   // control point 1
                4.8, -1.0,   // control point 2
                4.9, -1.6    // end point
            );

            // Lower outer edge
            shape.bezierCurveTo(
                4.9, -2.1,   // control point 1
                4.7, -2.5,   // control point 2
                4.3, -2.7    // end point
            );

            // Bottom rounded edge
            shape.bezierCurveTo(
                3.8, -2.9,   // control point 1
                3.2, -2.9,   // control point 2
                2.6, -2.7    // end point
            );

            // Trailing edge curves back to body
            shape.bezierCurveTo(
                1.8, -2.4,   // control point 1
                1.0, -1.8,   // control point 2
                0.4, -1.2    // end point
            );

            // Inner edge along body
            shape.bezierCurveTo(
                0.2, -0.6,   // control point 1
                0.1, 0.0,    // control point 2
                0, 0.6       // end point
            );

            // Close back to start
            shape.lineTo(0, 1.2);

            const geometry = new THREE.ShapeGeometry(shape);
            return geometry;
        }

        // Create wings
        // Left wing
        const leftWingGeom = createSmoothWing();
        const leftWing = new THREE.Mesh(leftWingGeom, wingMaterial);
        leftWing.position.set(-0.15, 0, 0);
        leftWing.rotation.y = Math.PI;
        butterfly.add(leftWing);

        // Right wing
        const rightWingGeom = createSmoothWing();
        const rightWing = new THREE.Mesh(rightWingGeom, wingMaterial);
        rightWing.position.set(0.15, 0, 0);
        butterfly.add(rightWing);

        // Body (rounded cylinder)
        const bodyGeometry = new THREE.CylinderGeometry(0.15, 0.12, 3, 16);
        const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
        body.castShadow = true;
        butterfly.add(body);

        // Head
        const headGeometry = new THREE.SphereGeometry(0.25, 16, 16);
        const head = new THREE.Mesh(headGeometry, bodyMaterial);
        head.position.y = 1.7;
        head.castShadow = true;
        butterfly.add(head);

        // Antennae
        const antennaGeometry = new THREE.CylinderGeometry(0.02, 0.02, 0.8, 8);

        const leftAntenna = new THREE.Mesh(antennaGeometry, bodyMaterial);
        leftAntenna.position.set(-0.15, 2.0, 0.1);
        leftAntenna.rotation.z = 0.3;
        leftAntenna.rotation.x = 0.2;
        butterfly.add(leftAntenna);

        const rightAntenna = new THREE.Mesh(antennaGeometry, bodyMaterial);
        rightAntenna.position.set(0.15, 2.0, 0.1);
        rightAntenna.rotation.z = -0.3;
        rightAntenna.rotation.x = 0.2;
        butterfly.add(rightAntenna);

        // Antenna tips
        const antennaTipGeometry = new THREE.SphereGeometry(0.05, 8, 8);

        const leftAntennaTip = new THREE.Mesh(antennaTipGeometry, bodyMaterial);
        leftAntennaTip.position.set(-0.25, 2.4, 0.2);
        butterfly.add(leftAntennaTip);

        const rightAntennaTip = new THREE.Mesh(antennaTipGeometry, bodyMaterial);
        rightAntennaTip.position.set(0.25, 2.4, 0.2);
        butterfly.add(rightAntennaTip);

        scene.add(butterfly);

        // Ground plane for reference
        const groundGeometry = new THREE.PlaneGeometry(20, 20);
        const groundMaterial = new THREE.MeshPhongMaterial({
            color: 0xd4e9f7,
            side: THREE.DoubleSide
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -2;
        ground.receiveShadow = true;
        scene.add(ground);

        // View preset functions
        window.setView = function(view) {
            controls.reset();

            switch(view) {
                case 'front':
                    camera.position.set(0, 0, 8);
                    break;
                case 'side':
                    camera.position.set(8, 0, 0);
                    break;
                case 'top':
                    camera.position.set(0, 8, 0.1);
                    break;
                case 'quarter':
                    camera.position.set(5, 3, 5);
                    break;
            }

            camera.lookAt(0, 0, 0);
            controls.update();
        };

        window.resetPosition = function() {
            camera.position.set(0, 2, 8);
            camera.lookAt(0, 0, 0);
            controls.reset();
        };

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
