<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flickflauder - CSS 3D Front Quarter Right</title>
    <link rel="stylesheet" href="styles.css">

    <style>
        .butterfly-3d-angle {
            transform: perspective(1000px) rotateX(20deg) rotateY(30deg) !important;
            transform-style: preserve-3d;
        }

        .butterfly-3d-angle.flying {
            animation: flyAway3D 10s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes flyAway3D {
            0% { transform: perspective(1000px) rotateX(20deg) rotateY(30deg) translate(-50%, 0) translateZ(0) scale(1); opacity: 1; }
            10% { transform: perspective(1000px) rotateX(25deg) rotateY(35deg) translate(50px, -40px) translateZ(15px) scale(1.05); opacity: 1; }
            25% { transform: perspective(1000px) rotateX(15deg) rotateY(25deg) translate(150px, -80px) translateZ(25px) scale(1.15); opacity: 1; }
            40% { transform: perspective(1000px) rotateX(30deg) rotateY(40deg) translate(100px, -150px) translateZ(30px) scale(1.25); opacity: 1; }
            55% { transform: perspective(1000px) rotateX(20deg) rotateY(20deg) translate(-50px, -200px) translateZ(25px) scale(1.35); opacity: 0.95; }
            70% { transform: perspective(1000px) rotateX(35deg) rotateY(35deg) translate(-30px, -300px) translateZ(35px) scale(1.45); opacity: 0.85; }
            85% { transform: perspective(1000px) rotateX(25deg) rotateY(25deg) translate(-60px, -500px) translateZ(50px) scale(1.55); opacity: 0.6; }
            100% { transform: perspective(1000px) rotateX(40deg) rotateY(30deg) translate(-30px, -750px) translateZ(70px) scale(1.7); opacity: 0; }
        }
    </style>
</head>
<body>
    <section id="hero" class="hero">
        <div class="container">
            <h1 class="logo-title">
                fl<span class="i-wrapper">i<svg id="butterfly" class="butterfly butterfly-3d-angle" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <g class="butterfly-body">
                        <ellipse class="wing wing-left-top" cx="35" cy="40" rx="18" ry="25" transform="rotate(-30 35 40)"/>
                        <ellipse class="wing wing-left-bottom" cx="38" cy="60" rx="12" ry="18" transform="rotate(-20 38 60)"/>
                        <ellipse class="wing wing-right-top" cx="65" cy="40" rx="18" ry="25" transform="rotate(30 65 40)"/>
                        <ellipse class="wing wing-right-bottom" cx="62" cy="60" rx="12" ry="18" transform="rotate(20 62 60)"/>
                        <ellipse class="body" cx="50" cy="50" rx="4" ry="20"/>
                        <path class="antenna" d="M 50 35 Q 45 25 42 20" stroke-width="1.5" fill="none"/>
                        <path class="antenna" d="M 50 35 Q 55 25 58 20" stroke-width="1.5" fill="none"/>
                    </g>
                </svg></span>ckflauder
            </h1>
            <p class="tagline">CSS 3D Transform - Front Quarter Right (20°X, 30°Y)</p>
            <div class="cta-buttons">
                <a href="butterfly-comparison.html" class="btn btn-primary">View All Variants</a>
                <a href="index.html" class="btn btn-secondary">Original</a>
            </div>
        </div>
    </section>

    <section class="services">
        <div class="container">
            <h2>About This View</h2>
            <p style="text-align: center; max-width: 800px; margin: 0 auto;">
                Front-quarter-right view with 20° X-rotation and 30° Y-rotation. Wings appear tilted toward the viewer on the right side.
            </p>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
