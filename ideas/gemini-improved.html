<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sweet Spot Flight - Pastel Edition</title>
    <style>
        :root {
            /* 0.28s: The perfect balance of energy and elegance */
            --wing-speed: 0.28s;
            /* Pastel color palette */
            --lavender: #b8a4d4;
            --peach: #ffc5a8;
            --mint: #a8e6cf;
            --coral: #ffb3ba;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #f5f0fa 0%, #fef5f1 40%, #e8f7f0 100%);
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            perspective: 1200px;
        }

        /* 1. THE FIELD (Forward Motion) */
        #flower-field {
            position: absolute;
            width: 100%; height: 100%;
            transform-style: preserve-3d;
        }

        .flower {
            position: absolute;
            top: 50%; left: 50%;
            transform-style: preserve-3d;
            animation: zoom-past 9s linear infinite;
        }

        .flower-svg {
            width: 40px; height: 40px;
            filter: drop-shadow(0 0 8px currentColor);
        }

        @keyframes zoom-past {
            0% {
                transform: translate3d(var(--x-start), var(--y-start), -1200px) scale(0.1);
                opacity: 0;
            }
            15% { opacity: 0.8; }
            50% { opacity: 0.5; }
            85% { opacity: 0.5; }
            100% {
                transform: translate3d(var(--x-end), var(--y-end), 800px) scale(3.5);
                filter: blur(12px);
                opacity: 0;
            }
        }

        /* 2. THE BUTTERFLY */
        .butterfly-chase {
            position: absolute;
            transform-style: preserve-3d;
            animation: struggle 5s ease-in-out infinite alternate;
            z-index: 100;
            will-change: transform;
        }

        .butterfly-orientation {
            transform-style: preserve-3d;
            transform: rotateX(65deg);
        }

        .butterfly-assembly {
            display: flex; align-items: center; justify-content: center;
            transform-style: preserve-3d;
            animation: body-bob var(--wing-speed) ease-in-out infinite alternate;
        }

        /* BODY STRUCTURE */
        .body-3d {
            position: relative;
            width: 6px;
            height: 35px;
            transform-style: preserve-3d;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
        }
        .segment {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--lavender);
        }
        .head { width: 6px; height: 6px; top: -8px; }
        .thorax { width: 8px; height: 14px; top: -4px; }
        .abdomen { width: 5px; height: 25px; top: 10px; }

        /* WINGS - Improved smooth timing */
        .wing-set {
            width: min(110px, 15vw);
            height: min(130px, 18vh);
            transform-style: preserve-3d;
        }
        /* Smoother ease-in-out for organic motion */
        .left {
            transform-origin: right center;
            animation: flap-l var(--wing-speed) ease-in-out infinite alternate;
        }
        .right {
            transform-origin: left center;
            animation: flap-r var(--wing-speed) ease-in-out infinite alternate;
        }

        .wing-outline {
            fill: rgba(184, 164, 212, 0.15);
            stroke: url(#grad-pastel);
            stroke-width: 2.2;
        }

        /* Wing veins for detail */
        .wing-vein {
            stroke: rgba(51, 51, 51, 0.5);
            stroke-width: 0.5;
            fill: none;
        }

        /* Wing spots */
        .wing-spot {
            fill: rgba(51, 51, 51, 0.25);
        }

        /* Enhanced flight path with deeper Z-movement and figure-8 motion */
        @keyframes struggle {
            0% {
                transform: translate3d(-5vw, 3vh, -80px) rotateZ(-12deg);
            }
            25% {
                transform: translate3d(0vw, -2vh, 100px) rotateZ(5deg);
            }
            50% {
                transform: translate3d(5vw, 2vh, 250px) rotateZ(12deg);
            }
            75% {
                transform: translate3d(2vw, -1vh, 120px) rotateZ(-5deg);
            }
            100% {
                transform: translate3d(-3vw, 1vh, 0px) rotateZ(-8deg);
            }
        }

        /* Improved wing flaps with subtle deformation and figure-8 tip motion */
        @keyframes flap-l {
            0% { transform: rotateY(8deg) translateY(0px); }
            100% { transform: rotateY(82deg) rotateZ(-18deg) translateY(-3px); }
        }
        @keyframes flap-r {
            0% { transform: rotateY(-8deg) translateY(0px); }
            100% { transform: rotateY(-82deg) rotateZ(18deg) translateY(-3px); }
        }
        @keyframes body-bob {
            0% { transform: translateZ(0); }
            100% { transform: translateZ(18px); }
        }

        /* ACCESSIBILITY: Reduced motion support */
        @media (prefers-reduced-motion: reduce) {
            .butterfly-chase {
                animation: none;
            }
            .flower {
                animation: zoom-past 15s linear infinite;
            }
            .left, .right {
                animation: none;
                transform: rotateY(45deg);
            }
            .butterfly-assembly {
                animation: none;
            }
        }
    </style>
</head>
<body>

    <div id="flower-field"></div>

    <div class="butterfly-chase">
        <div class="butterfly-orientation">
            <div class="butterfly-assembly">
                <div class="wing-set left">
                    <svg viewBox="0 0 100 120">
                        <defs>
                            <linearGradient id="grad-pastel">
                                <stop offset="0%" stop-color="#b8a4d4"/>
                                <stop offset="50%" stop-color="#ffc5a8"/>
                                <stop offset="100%" stop-color="#ffb3ba"/>
                            </linearGradient>
                        </defs>
                        <!-- Wing shape - split into two paths for uniform filling -->
                        <path class="wing-outline" d="M100,40 C70,0 10,5 15,45 C20,75 90,65 100,40 Z" />
                        <path class="wing-outline" d="M100,45 C100,45 80,100 70,110 C50,100 20,75 25,50 C30,35 80,40 100,45 Z" />
                        <!-- Wing veins for detail -->
                        <line class="wing-vein" x1="100" y1="40" x2="30" y2="45"/>
                        <line class="wing-vein" x1="100" y1="45" x2="35" y2="70"/>
                        <line class="wing-vein" x1="90" y1="50" x2="70" y2="105"/>
                        <!-- Wing spots -->
                        <circle class="wing-spot" cx="60" cy="35" r="3"/>
                        <circle class="wing-spot" cx="45" cy="60" r="2.5"/>
                        <circle class="wing-spot" cx="65" cy="80" r="2"/>
                    </svg>
                </div>
                <div class="body-3d">
                    <div class="segment head"></div><div class="segment thorax"></div><div class="segment abdomen"></div>
                </div>
                <div class="wing-set right">
                    <svg viewBox="0 0 100 120">
                        <!-- Wing shape - split into two paths for uniform filling -->
                        <path class="wing-outline" d="M0,40 C30,0 90,5 85,45 C80,75 10,65 0,40 Z" />
                        <path class="wing-outline" d="M0,45 C0,45 20,100 30,110 C50,100 80,75 75,50 C70,35 20,40 0,45 Z" />
                        <!-- Wing veins for detail -->
                        <line class="wing-vein" x1="0" y1="40" x2="70" y2="45"/>
                        <line class="wing-vein" x1="0" y1="45" x2="65" y2="70"/>
                        <line class="wing-vein" x1="10" y1="50" x2="30" y2="105"/>
                        <!-- Wing spots -->
                        <circle class="wing-spot" cx="40" cy="35" r="3"/>
                        <circle class="wing-spot" cx="55" cy="60" r="2.5"/>
                        <circle class="wing-spot" cx="35" cy="80" r="2"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script>
        const field = document.getElementById('flower-field');
        const count = 25; // Reduced from 35 for better performance

        // Three flower types for variety
        const flowerTypes = [
            {
                name: 'daisy',
                petals: 5,
                svg: `<svg class="flower-svg" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="5" fill="#ffd700"/>
                    <path d="M50 5 Q65 30 50 50 Q35 30 50 5" fill="currentColor"/>
                    <path d="M50 5 Q65 30 50 50 Q35 30 50 5" fill="currentColor" transform="rotate(72 50 50)"/>
                    <path d="M50 5 Q65 30 50 50 Q35 30 50 5" fill="currentColor" transform="rotate(144 50 50)"/>
                    <path d="M50 5 Q65 30 50 50 Q35 30 50 5" fill="currentColor" transform="rotate(216 50 50)"/>
                    <path d="M50 5 Q65 30 50 50 Q35 30 50 5" fill="currentColor" transform="rotate(288 50 50)"/>
                </svg>`
            },
            {
                name: 'simple',
                petals: 4,
                svg: `<svg class="flower-svg" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="6" fill="#ffd700"/>
                    <ellipse cx="50" cy="25" rx="12" ry="20" fill="currentColor"/>
                    <ellipse cx="75" cy="50" rx="20" ry="12" fill="currentColor"/>
                    <ellipse cx="50" cy="75" rx="12" ry="20" fill="currentColor"/>
                    <ellipse cx="25" cy="50" rx="20" ry="12" fill="currentColor"/>
                </svg>`
            },
            {
                name: 'star',
                petals: 6,
                svg: `<svg class="flower-svg" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="5" fill="#ffd700"/>
                    <path d="M50 10 Q58 35 50 50 Q42 35 50 10" fill="currentColor"/>
                    <path d="M50 10 Q58 35 50 50 Q42 35 50 10" fill="currentColor" transform="rotate(60 50 50)"/>
                    <path d="M50 10 Q58 35 50 50 Q42 35 50 10" fill="currentColor" transform="rotate(120 50 50)"/>
                    <path d="M50 10 Q58 35 50 50 Q42 35 50 10" fill="currentColor" transform="rotate(180 50 50)"/>
                    <path d="M50 10 Q58 35 50 50 Q42 35 50 10" fill="currentColor" transform="rotate(240 50 50)"/>
                    <path d="M50 10 Q58 35 50 50 Q42 35 50 10" fill="currentColor" transform="rotate(300 50 50)"/>
                </svg>`
            }
        ];

        // Pastel color palette
        const colors = ['var(--lavender)', 'var(--peach)', 'var(--mint)', 'var(--coral)'];

        for(let i=0; i<count; i++) {
            const container = document.createElement('div');
            container.className = 'flower';

            // Random angle and distance for distribution
            const angle = Math.random() * Math.PI * 2;
            const distance = 130 + Math.random() * 260;
            const xEnd = Math.cos(angle) * distance + 'vw';
            const yEnd = Math.sin(angle) * distance + 'vh';

            // Set custom properties
            container.style.setProperty('--x-start', (Math.random() * 10 - 5) + 'vw');
            container.style.setProperty('--y-start', (Math.random() * 10 - 5) + 'vh');
            container.style.setProperty('--x-end', xEnd);
            container.style.setProperty('--y-end', yEnd);

            // Random pastel color
            container.style.color = colors[Math.floor(Math.random() * colors.length)];

            // Varied timing
            container.style.animationDuration = (7 + Math.random() * 7) + 's';
            container.style.animationDelay = -(Math.random() * 15) + 's';

            // Random flower type
            const flowerType = flowerTypes[Math.floor(Math.random() * flowerTypes.length)];
            container.innerHTML = flowerType.svg;

            field.appendChild(container);
        }
    </script>
</body>
</html>
