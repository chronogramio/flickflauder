<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sweet Spot Flight</title>
    <style>
        :root {
            /* 0.28s: The perfect balance of energy and elegance */
            --wing-speed: 0.28s; 
            --blue: #00d2ff;
            --pink: #ff007f;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%);
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            perspective: 1200px;
        }

        /* 1. THE FIELD (Forward Motion) */
        #flower-field {
            position: absolute;
            width: 100%; height: 100%;
            transform-style: preserve-3d;
        }

        .flower {
            position: absolute;
            top: 50%; left: 50%;
            transform-style: preserve-3d;
            animation: zoom-past 9s linear infinite;
        }

        .flower-svg {
            width: 40px; height: 40px;
            filter: drop-shadow(0 0 8px currentColor);
            opacity: 0.6;
        }

        @keyframes zoom-past {
            0% { 
                transform: translate3d(var(--x-start), var(--y-start), -1200px) scale(0.1); 
                opacity: 0;
            }
            15% { opacity: 0.7; }
            85% { opacity: 0.7; }
            100% { 
                transform: translate3d(var(--x-end), var(--y-end), 800px) scale(3.5); 
                filter: blur(12px);
                opacity: 0;
            }
        }

        /* 2. THE BUTTERFLY */
        .butterfly-chase {
            position: absolute;
            transform-style: preserve-3d;
            animation: struggle 5s ease-in-out infinite alternate;
            z-index: 100;
        }

        .butterfly-orientation {
            transform-style: preserve-3d;
            transform: rotateX(65deg); 
        }

        .butterfly-assembly {
            display: flex; align-items: center; justify-content: center;
            transform-style: preserve-3d;
            animation: body-bob var(--wing-speed) ease-in-out infinite alternate;
        }

        /* BODY STRUCTURE */
        .body-3d { position: relative; width: 6px; height: 35px; transform-style: preserve-3d; }
        .segment { position: absolute; left: 50%; transform: translateX(-50%); background: #fff; border-radius: 50%; box-shadow: 0 0 10px var(--blue); }
        .head { width: 6px; height: 6px; top: -8px; }
        .thorax { width: 8px; height: 14px; top: -4px; }
        .abdomen { width: 5px; height: 25px; top: 10px; }

        /* WINGS - Snap-shut timing */
        .wing-set { width: 110px; height: 130px; transform-style: preserve-3d; }
        /* cubic-bezier(0.6, 0, 0.4, 1) creates a faster 'downstroke' snap */
        .left { transform-origin: right center; animation: flap-l var(--wing-speed) cubic-bezier(0.6, 0, 0.4, 1) infinite alternate; }
        .right { transform-origin: left center; animation: flap-r var(--wing-speed) cubic-bezier(0.6, 0, 0.4, 1) infinite alternate; }
        
        .wing-outline { fill: rgba(255,255,255,0.06); stroke: url(#grad); stroke-width: 2.2; }

        @keyframes struggle {
            0% { transform: translate3d(-3vw, 2vh, 0) rotateZ(-4deg); }
            100% { transform: translate3d(3vw, -2vh, 120px) rotateZ(4deg); }
        }

        @keyframes flap-l { 0% { transform: rotateY(8deg); } 100% { transform: rotateY(82deg) rotateZ(-18deg); } }
        @keyframes flap-r { 0% { transform: rotateY(-8deg); } 100% { transform: rotateY(-82deg) rotateZ(18deg); } }
        @keyframes body-bob { 0% { transform: translateZ(0); } 100% { transform: translateZ(18px); } }
    </style>
</head>
<body>

    <div id="flower-field"></div>

    <div class="butterfly-chase">
        <div class="butterfly-orientation">
            <div class="butterfly-assembly">
                <div class="wing-set left">
                    <svg viewBox="0 0 100 120">
                        <defs><linearGradient id="grad"><stop offset="0%" stop-color="#00d2ff"/><stop offset="100%" stop-color="#ff007f"/></linearGradient></defs>
                        <path class="wing-outline" d="M100,40 C70,0 10,5 15,45 C20,75 90,65 100,40 M100,45 C100,45 80,100 70,110 C50,100 20,75 25,50 C30,35 80,40 100,45" />
                    </svg>
                </div>
                <div class="body-3d">
                    <div class="segment head"></div><div class="segment thorax"></div><div class="segment abdomen"></div>
                </div>
                <div class="wing-set right">
                    <svg viewBox="0 0 100 120">
                        <path class="wing-outline" d="M0,40 C30,0 90,5 85,45 C80,75 10,65 0,40 M0,45 C0,45 20,100 30,110 C50,100 80,75 75,50 C70,35 20,40 0,45" />
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script>
        const field = document.getElementById('flower-field');
        const count = 35;

        const flowerSVG = `
            <svg class="flower-svg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="5" fill="white"/>
                <path d="M50 5 Q65 30 50 50 Q35 30 50 5" fill="currentColor"/>
                <path d="M50 5 Q65 30 50 50 Q35 30 50 5" fill="currentColor" transform="rotate(72 50 50)"/>
                <path d="M50 5 Q65 30 50 50 Q35 30 50 5" fill="currentColor" transform="rotate(144 50 50)"/>
                <path d="M50 5 Q65 30 50 50 Q35 30 50 5" fill="currentColor" transform="rotate(216 50 50)"/>
                <path d="M50 5 Q65 30 50 50 Q35 30 50 5" fill="currentColor" transform="rotate(288 50 50)"/>
            </svg>
        `;

        for(let i=0; i<count; i++) {
            const container = document.createElement('div');
            container.className = 'flower';
            const angle = Math.random() * Math.PI * 2;
            const distance = 130 + Math.random() * 260; 
            const xEnd = Math.cos(angle) * distance + 'vw';
            const yEnd = Math.sin(angle) * distance + 'vh';
            container.style.setProperty('--x-start', (Math.random() * 10 - 5) + 'vw');
            container.style.setProperty('--y-start', (Math.random() * 10 - 5) + 'vh');
            container.style.setProperty('--x-end', xEnd);
            container.style.setProperty('--y-end', yEnd);
            container.style.color = Math.random() > 0.5 ? 'var(--blue)' : 'var(--pink)';
            container.style.animationDuration = (7 + Math.random() * 7) + 's';
            container.style.animationDelay = -(Math.random() * 15) + 's';
            container.innerHTML = flowerSVG;
            field.appendChild(container);
        }
    </script>
</body>
</html>
