<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Butterfly - Three.js</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0f7fc 0%, #d4e9f7 100%);
            overflow: hidden;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            min-width: 250px;
        }

        h1 {
            margin: 0 0 15px 0;
            font-size: 1.3rem;
            color: #1a1a1a;
        }

        .model-info {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .status {
            font-size: 0.85rem;
            color: #ff6b35;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .view-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 15px;
            background: #ff6b35;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #e85a2a;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .control-hint {
            font-size: 0.8rem;
            color: #999;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 16px;
            background: #1a1a1a;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .back-link:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="ui-panel">
        <h1>🦋 Animated Butterfly</h1>
        <div class="model-info">
            <strong>Animation:</strong> Wing flapping + hovering<br>
            <strong>Behavior:</strong> Natural butterfly motion
        </div>

        <div class="status" id="status">Status: Flapping</div>

        <div class="view-buttons">
            <button onclick="setView('front')">Front View</button>
            <button onclick="setView('side')">Side View</button>
            <button onclick="setView('top')">Top View</button>
            <button onclick="setView('quarter')">3/4 View</button>
        </div>

        <button onclick="resetPosition()" style="width: 100%;">Reset Position</button>

        <div class="control-hint">
            🖱️ <strong>Mouse Controls:</strong><br>
            • Left drag: Rotate<br>
            • Right drag: Pan<br>
            • Scroll: Zoom
        </div>

        <a href="test-all-variants.html" class="back-link">← Back to Test Page</a>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f7fc);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 25);  // Pulled back to see larger flight area

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Orbit controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 5);
        directionalLight.castShadow = true;
        scene.add(directionalLight);

        const backLight = new THREE.DirectionalLight(0xffffff, 0.3);
        backLight.position.set(-5, 5, -5);
        scene.add(backLight);

        // Materials
        const wingMaterial = new THREE.MeshPhongMaterial({
            color: 0xff8c42,  // Monarch orange
            side: THREE.DoubleSide,
            shininess: 30,
            transparent: true,
            opacity: 0.95
        });

        const bodyMaterial = new THREE.MeshPhongMaterial({
            color: 0x1a1a1a,
            shininess: 50
        });

        // Create butterfly group
        const butterfly = new THREE.Group();

        // Create smooth butterfly wing with rounded edges using multiple vertices
        function createSmoothWing() {
            const shape = new THREE.Shape();

            // Start at body attachment - top
            shape.moveTo(0, 1.2);

            // Upper wing section - smooth rounded shape
            // Leading edge curves outward and upward
            shape.bezierCurveTo(
                0.8, 1.6,    // control point 1
                1.8, 2.2,    // control point 2
                2.8, 2.6     // end point
            );

            // Continue to apex - rounded top
            shape.bezierCurveTo(
                3.6, 2.9,    // control point 1
                4.2, 3.0,    // control point 2 (peak)
                4.6, 2.8     // end point (start coming down)
            );

            // Outer edge curves down
            shape.bezierCurveTo(
                4.8, 2.5,    // control point 1
                4.9, 2.0,    // control point 2
                4.8, 1.4     // end point
            );

            // Middle indent (where fore and hindwing meet)
            shape.bezierCurveTo(
                4.7, 0.8,    // control point 1
                4.5, 0.3,    // control point 2
                4.3, 0       // end point (middle)
            );

            // Lower wing section - curves back out
            shape.bezierCurveTo(
                4.5, -0.4,   // control point 1
                4.8, -1.0,   // control point 2
                4.9, -1.6    // end point
            );

            // Lower outer edge
            shape.bezierCurveTo(
                4.9, -2.1,   // control point 1
                4.7, -2.5,   // control point 2
                4.3, -2.7    // end point
            );

            // Bottom rounded edge
            shape.bezierCurveTo(
                3.8, -2.9,   // control point 1
                3.2, -2.9,   // control point 2
                2.6, -2.7    // end point
            );

            // Trailing edge curves back to body
            shape.bezierCurveTo(
                1.8, -2.4,   // control point 1
                1.0, -1.8,   // control point 2
                0.4, -1.2    // end point
            );

            // Inner edge along body
            shape.bezierCurveTo(
                0.2, -0.6,   // control point 1
                0.1, 0.0,    // control point 2
                0, 0.6       // end point
            );

            // Close back to start
            shape.lineTo(0, 1.2);

            const geometry = new THREE.ShapeGeometry(shape);
            return geometry;
        }

        // Create wings
        // Left wing
        const leftWingGeom = createSmoothWing();
        const leftWing = new THREE.Mesh(leftWingGeom, wingMaterial);
        leftWing.position.set(-0.15, 0, 0);
        leftWing.rotation.y = Math.PI;
        butterfly.add(leftWing);

        // Right wing
        const rightWingGeom = createSmoothWing();
        const rightWing = new THREE.Mesh(rightWingGeom, wingMaterial);
        rightWing.position.set(0.15, 0, 0);
        butterfly.add(rightWing);

        // Body (rounded cylinder)
        const bodyGeometry = new THREE.CylinderGeometry(0.15, 0.12, 3, 16);
        const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
        body.castShadow = true;
        butterfly.add(body);

        // Head
        const headGeometry = new THREE.SphereGeometry(0.25, 16, 16);
        const head = new THREE.Mesh(headGeometry, bodyMaterial);
        head.position.y = 1.7;
        head.castShadow = true;
        butterfly.add(head);

        // Antennae
        const antennaGeometry = new THREE.CylinderGeometry(0.02, 0.02, 0.8, 8);

        const leftAntenna = new THREE.Mesh(antennaGeometry, bodyMaterial);
        leftAntenna.position.set(-0.15, 2.0, 0.1);
        leftAntenna.rotation.z = 0.3;
        leftAntenna.rotation.x = 0.2;
        butterfly.add(leftAntenna);

        const rightAntenna = new THREE.Mesh(antennaGeometry, bodyMaterial);
        rightAntenna.position.set(0.15, 2.0, 0.1);
        rightAntenna.rotation.z = -0.3;
        rightAntenna.rotation.x = 0.2;
        butterfly.add(rightAntenna);

        // Antenna tips
        const antennaTipGeometry = new THREE.SphereGeometry(0.05, 8, 8);

        const leftAntennaTip = new THREE.Mesh(antennaTipGeometry, bodyMaterial);
        leftAntennaTip.position.set(-0.25, 2.4, 0.2);
        butterfly.add(leftAntennaTip);

        const rightAntennaTip = new THREE.Mesh(antennaTipGeometry, bodyMaterial);
        rightAntennaTip.position.set(0.25, 2.4, 0.2);
        butterfly.add(rightAntennaTip);

        scene.add(butterfly);

        // ============================================
        // CREATE LANDING BRANCHES
        // ============================================

        const branchMaterial = new THREE.MeshPhongMaterial({
            color: 0x8B4513,  // Brown
            shininess: 10
        });

        const landingSpots = [];

        // Branch 1 - Left side, mid height
        const branch1 = new THREE.Mesh(
            new THREE.CylinderGeometry(0.08, 0.06, 3, 8),
            branchMaterial
        );
        branch1.position.set(-10, 6, 5);
        branch1.rotation.z = Math.PI / 6;
        scene.add(branch1);
        landingSpots.push({ branch: branch1, position: new THREE.Vector3(-10, 6, 5) });

        // Branch 2 - Right side, higher
        const branch2 = new THREE.Mesh(
            new THREE.CylinderGeometry(0.08, 0.06, 2.5, 8),
            branchMaterial
        );
        branch2.position.set(12, 10, -5);
        branch2.rotation.z = -Math.PI / 8;
        scene.add(branch2);
        landingSpots.push({ branch: branch2, position: new THREE.Vector3(12, 10, -5) });

        // Branch 3 - Front, lower
        const branch3 = new THREE.Mesh(
            new THREE.CylinderGeometry(0.08, 0.06, 3.5, 8),
            branchMaterial
        );
        branch3.position.set(2, 4, 12);
        branch3.rotation.z = Math.PI / 10;
        scene.add(branch3);
        landingSpots.push({ branch: branch3, position: new THREE.Vector3(2, 4, 12) });

        // Branch 4 - Back, mid height
        const branch4 = new THREE.Mesh(
            new THREE.CylinderGeometry(0.08, 0.06, 2.8, 8),
            branchMaterial
        );
        branch4.position.set(-5, 8, -15);
        branch4.rotation.z = -Math.PI / 12;
        scene.add(branch4);
        landingSpots.push({ branch: branch4, position: new THREE.Vector3(-5, 8, -15) });

        // Ground plane for reference
        const groundGeometry = new THREE.PlaneGeometry(50, 50);
        const groundMaterial = new THREE.MeshPhongMaterial({
            color: 0xd4e9f7,
            side: THREE.DoubleSide
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -2;
        ground.receiveShadow = true;
        scene.add(ground);

        // ============================================
        // ANIMATION SYSTEM
        // ============================================

        const clock = new THREE.Clock();

        // Create flight path using Catmull-Rom spline
        // Much larger area with significant 3D variation (up/down movement)
        const pathPoints = [
            new THREE.Vector3(-15, 8, -12),   // High point, far back-left
            new THREE.Vector3(-8, 3, 10),     // Low, forward-left
            new THREE.Vector3(5, 12, 15),     // Very high, far forward-right
            new THREE.Vector3(18, 5, 8),      // Mid-height, far right
            new THREE.Vector3(15, 10, -10),   // High, back-right
            new THREE.Vector3(0, 2, -18),     // Low, far back center
            new THREE.Vector3(-12, 15, 0),    // Very high, left center
            new THREE.Vector3(-5, 6, 12)      // Mid-height, forward
        ];

        const flightPath = new THREE.CatmullRomCurve3(pathPoints, true); // true = closed loop

        // Animation state
        const animationState = {
            mode: 'flapping',           // 'flapping' or 'hovering'
            lastModeChange: 0,          // Time of last mode change
            transitionDuration: 0.8,    // Smooth transition time

            // Landing system
            landingState: 'flying',     // 'flying', 'approaching', 'landed', 'takingOff'
            landingStartTime: 0,        // When landing/takeoff started
            targetLandingSpot: null,    // Which branch to land on
            flyingDuration: 15,         // Fly for 15-20 seconds before landing
            restDuration: 12,           // Rest for 10-15 seconds
            nextLandingTime: 15,        // When to next land
            landingStartPosition: new THREE.Vector3(),

            // Flight path parameters
            pathProgress: 0,            // Position along path (0 to 1)
            flightSpeed: 0.08,          // Speed along path (fast and energetic)
            lastPosition: new THREE.Vector3(),
            currentVelocity: 0,         // Current speed for flapping sync

            // Wing flapping parameters
            baseFlapSpeed: 8.0,         // Base flaps per second (Hz)
            fastFlapSpeed: 12.0,        // Fast flapping when moving quickly
            slowFlapSpeed: 3.0,         // Slow flapping when turning
            flapAmplitude: Math.PI / 3, // ±60 degrees rotation
            phaseOffset: 0.1,           // Slight delay between wings

            // Wing folding for landing
            wingFoldProgress: 0,        // 0 = open, 1 = closed
            wingFoldDuration: 0.5,      // Fold in 0.5 seconds

            // Hovering parameters
            hoverSpeed: 2.0,            // Gentle bobbing speed
            hoverAmplitude: 0.15,       // Up/down distance
            rotationSpeed: 0.5,         // Gentle body rotation

            // Transition smoothing
            currentFlapSpeed: 8.0,      // Current interpolated flap speed
            currentAmplitude: Math.PI / 3  // Current interpolated amplitude
        };

        // Landing attachment lines (legs)
        let attachmentLines = null;

        // Helper function to create attachment lines (legs)
        function createAttachmentLines(targetPos) {
            if (attachmentLines) {
                butterfly.remove(attachmentLines);
            }

            const linesGroup = new THREE.Group();
            const legMaterial = new THREE.MeshPhongMaterial({ color: 0x1a1a1a });

            // Calculate positions for two legs
            const bodyBottom = new THREE.Vector3(0, -1.2, 0);
            const relativeTarget = targetPos.clone().sub(butterfly.position);

            // Left leg
            const leftLegGeom = new THREE.CylinderGeometry(0.01, 0.01, relativeTarget.length(), 4);
            const leftLeg = new THREE.Mesh(leftLegGeom, legMaterial);
            leftLeg.position.copy(bodyBottom).add(relativeTarget.clone().multiplyScalar(0.5));
            leftLeg.position.x -= 0.1;
            leftLeg.lookAt(relativeTarget);
            leftLeg.rotateX(Math.PI / 2);
            linesGroup.add(leftLeg);

            // Right leg
            const rightLegGeom = new THREE.CylinderGeometry(0.01, 0.01, relativeTarget.length(), 4);
            const rightLeg = new THREE.Mesh(rightLegGeom, legMaterial);
            rightLeg.position.copy(bodyBottom).add(relativeTarget.clone().multiplyScalar(0.5));
            rightLeg.position.x += 0.1;
            rightLeg.lookAt(relativeTarget);
            rightLeg.rotateX(Math.PI / 2);
            linesGroup.add(rightLeg);

            butterfly.add(linesGroup);
            attachmentLines = linesGroup;
        }

        // Function to animate butterfly
        function animateButterfly(delta) {
            const elapsedTime = clock.getElapsedTime();

            // ============================================
            // LANDING STATE MACHINE
            // ============================================

            if (animationState.landingState === 'flying') {
                // Check if time to land
                if (elapsedTime >= animationState.nextLandingTime) {
                    // Initiate landing
                    animationState.landingState = 'approaching';
                    animationState.landingStartTime = elapsedTime;
                    animationState.targetLandingSpot = landingSpots[Math.floor(Math.random() * landingSpots.length)];
                    animationState.landingStartPosition.copy(butterfly.position);
                    document.getElementById('status').textContent = 'Status: Landing...';
                }

                // Normal flight behavior
                animationState.pathProgress += animationState.flightSpeed * delta;
                if (animationState.pathProgress > 1.0) animationState.pathProgress -= 1.0;

                const newPosition = flightPath.getPoint(animationState.pathProgress);
                butterfly.position.copy(newPosition);

                const distance = newPosition.distanceTo(animationState.lastPosition);
                animationState.currentVelocity = distance / (delta || 0.016);
                animationState.lastPosition.copy(newPosition);

                // Velocity-based flapping
                if (animationState.currentVelocity > 2.0) {
                    var targetSpeed = animationState.fastFlapSpeed;
                    var targetAmplitude = animationState.flapAmplitude;
                } else {
                    var targetSpeed = animationState.slowFlapSpeed;
                    var targetAmplitude = animationState.flapAmplitude * 0.4;
                }

                animationState.wingFoldProgress += (0 - animationState.wingFoldProgress) * 0.1;

            } else if (animationState.landingState === 'approaching') {
                // Fly toward branch
                const approachDuration = 2.0;
                const timeSinceStart = elapsedTime - animationState.landingStartTime;
                const progress = Math.min(timeSinceStart / approachDuration, 1.0);
                const eased = progress < 0.5 ? 2 * progress * progress : 1 - Math.pow(-2 * progress + 2, 2) / 2;

                butterfly.position.lerpVectors(
                    animationState.landingStartPosition,
                    animationState.targetLandingSpot.position,
                    eased
                );

                // Slow down flapping as approaching
                var targetSpeed = animationState.slowFlapSpeed * (1 - progress);
                var targetAmplitude = animationState.flapAmplitude * (1 - progress * 0.6);

                // Fold wings
                animationState.wingFoldProgress += (1 - animationState.wingFoldProgress) * 0.15;

                if (progress >= 1.0) {
                    animationState.landingState = 'landed';
                    animationState.landingStartTime = elapsedTime;
                    createAttachmentLines(animationState.targetLandingSpot.position);
                    document.getElementById('status').textContent = 'Status: Resting on Branch';
                }

            } else if (animationState.landingState === 'landed') {
                // Rest on branch
                if (elapsedTime - animationState.landingStartTime >= animationState.restDuration) {
                    animationState.landingState = 'takingOff';
                    animationState.landingStartTime = elapsedTime;
                    document.getElementById('status').textContent = 'Status: Taking Off...';
                }

                // Wings fully folded
                var targetSpeed = 0;
                var targetAmplitude = 0;
                animationState.wingFoldProgress = 1.0;

            } else if (animationState.landingState === 'takingOff') {
                // Take off from branch
                const takeoffDuration = 1.0;
                const timeSinceStart = elapsedTime - animationState.landingStartTime;
                const progress = Math.min(timeSinceStart / takeoffDuration, 1.0);

                // Small hop up
                butterfly.position.y = animationState.targetLandingSpot.position.y + progress * 2;

                // Unfold wings
                animationState.wingFoldProgress += (0 - animationState.wingFoldProgress) * 0.2;

                // Resume flapping
                var targetSpeed = animationState.fastFlapSpeed * progress;
                var targetAmplitude = animationState.flapAmplitude * progress;

                if (progress >= 1.0) {
                    animationState.landingState = 'flying';
                    animationState.nextLandingTime = elapsedTime + 15 + Math.random() * 5;
                    if (attachmentLines) {
                        butterfly.remove(attachmentLines);
                        attachmentLines = null;
                    }
                    document.getElementById('status').textContent = 'Status: Flying';
                }
            }

            // Interpolate wing speed/amplitude
            animationState.currentFlapSpeed += (targetSpeed - animationState.currentFlapSpeed) * 0.1;
            animationState.currentAmplitude += (targetAmplitude - animationState.currentAmplitude) * 0.1;

            // Wing animation with folding
            const leftPhase = elapsedTime * animationState.currentFlapSpeed;
            const rightPhase = leftPhase + animationState.phaseOffset;

            // Apply folding: 0 = open (current behavior), 1 = closed (parallel/upright)
            const openRotationLeft = Math.PI + Math.sin(leftPhase) * animationState.currentAmplitude;
            const openRotationRight = -Math.sin(rightPhase) * animationState.currentAmplitude;
            const closedRotation = 0; // Upright/parallel

            leftWing.rotation.y = openRotationLeft * (1 - animationState.wingFoldProgress) + closedRotation * animationState.wingFoldProgress;
            rightWing.rotation.y = openRotationRight * (1 - animationState.wingFoldProgress) + closedRotation * animationState.wingFoldProgress;

            // Subtle bobbing (only when flying)
            if (animationState.landingState === 'flying') {
                const bobbing = Math.sin(elapsedTime * 2) * 0.1;
                butterfly.position.y += bobbing;
            }
        }

        // View preset functions
        window.setView = function(view) {
            controls.reset();

            switch(view) {
                case 'front':
                    camera.position.set(0, 0, 8);
                    break;
                case 'side':
                    camera.position.set(8, 0, 0);
                    break;
                case 'top':
                    camera.position.set(0, 8, 0.1);
                    break;
                case 'quarter':
                    camera.position.set(5, 3, 5);
                    break;
            }

            camera.lookAt(0, 0, 0);
            controls.update();
        };

        window.resetPosition = function() {
            camera.position.set(0, 8, 25);
            camera.lookAt(0, 0, 0);
            controls.reset();
        };

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            // Get delta time for smooth animation
            const delta = clock.getDelta();

            // Update butterfly animation
            animateButterfly(delta);

            controls.update();
            renderer.render(scene, camera);
        }

        // Initialize last position
        animationState.lastPosition.copy(flightPath.getPoint(0));

        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
