apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flickflauder-backend
  namespace: flickflauder
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - chat.flickflauder.com
      secretName: flickflauder-chat-tls
  rules:
    - host: chat.flickflauder.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flickflauder-backend
                port:
                  number: 80
