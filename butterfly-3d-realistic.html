<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic 3D Butterfly - Three.js</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0f7fc 0%, #d4e9f7 100%);
            overflow: hidden;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            min-width: 250px;
        }

        h1 {
            margin: 0 0 15px 0;
            font-size: 1.3rem;
            color: #1a1a1a;
        }

        .model-info {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .view-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 15px;
            background: #5ba3d0;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #4a8bb8;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .control-hint {
            font-size: 0.8rem;
            color: #999;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 16px;
            background: #1a1a1a;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .back-link:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="ui-panel">
        <h1>🦋 Realistic Butterfly</h1>
        <div class="model-info">
            <strong>Style:</strong> Organic curved wings resembling a monarch butterfly<br>
            <strong>Geometry:</strong> Custom BufferGeometry with bezier curves
        </div>

        <div class="view-buttons">
            <button onclick="setView('front')">Front View</button>
            <button onclick="setView('side')">Side View</button>
            <button onclick="setView('top')">Top View</button>
            <button onclick="setView('quarter')">3/4 View</button>
        </div>

        <button onclick="resetPosition()" style="width: 100%;">Reset Position</button>

        <div class="control-hint">
            🖱️ <strong>Mouse Controls:</strong><br>
            • Left drag: Rotate<br>
            • Right drag: Pan<br>
            • Scroll: Zoom
        </div>

        <a href="test-all-variants.html" class="back-link">← Back to Test Page</a>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f7fc);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Orbit controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 5);
        directionalLight.castShadow = true;
        scene.add(directionalLight);

        const backLight = new THREE.DirectionalLight(0xffffff, 0.3);
        backLight.position.set(-5, 5, -5);
        scene.add(backLight);

        // Materials
        const wingMaterial = new THREE.MeshPhongMaterial({
            color: 0x5ba3d0,
            side: THREE.DoubleSide,
            shininess: 30,
            transparent: true,
            opacity: 0.95
        });

        const bodyMaterial = new THREE.MeshPhongMaterial({
            color: 0x1a1a1a,
            shininess: 50
        });

        // Create butterfly group
        const butterfly = new THREE.Group();

        // Function to create realistic wing shape based on monarch butterfly anatomy
        // Real monarchs: wings slightly wider than tall with substantial area
        function createRealisticWing(isTop = true) {
            const shape = new THREE.Shape();

            if (isTop) {
                // Forewing - triangular shape with substantial height
                // Proportions: ~4.5 wide by 3.5 tall (closer to 1.3:1 ratio)
                shape.moveTo(0, 0);  // Body attachment point

                // Leading edge (costa) - curves upward and outward
                shape.quadraticCurveTo(1.2, 1.2, 2.5, 2.5);
                shape.quadraticCurveTo(3.5, 3.5, 4.0, 4.2);

                // Apex (wing tip) - pointed tip at top outer corner
                shape.lineTo(4.5, 4.8);

                // Outer margin (termen) - relatively straight line down from apex
                // This straight edge is characteristic of monarchs
                shape.lineTo(4.2, 4.0);
                shape.lineTo(3.8, 3.0);
                shape.lineTo(3.2, 2.0);
                shape.quadraticCurveTo(2.5, 1.0, 1.5, 0.5);

                // Trailing edge (dorsum) - back to body
                shape.quadraticCurveTo(0.8, 0.2, 0, 0);

            } else {
                // Hindwing - rounded oval shape, NO scalloping
                // Smaller: ~3.5 wide by 2.5 tall
                shape.moveTo(0, 0);  // Body attachment point

                // Leading edge - gentle rounded curve
                shape.quadraticCurveTo(0.8, -0.5, 2.0, -1.2);

                // Outer edge - smooth CONVEX curve (not scalloped!)
                shape.quadraticCurveTo(3.0, -1.8, 3.5, -2.3);

                // Bottom/trailing edge - smooth rounded curve back to body
                shape.quadraticCurveTo(3.3, -2.6, 2.8, -2.7);
                shape.quadraticCurveTo(1.8, -2.5, 1.0, -2.0);
                shape.quadraticCurveTo(0.4, -1.2, 0.1, -0.4);

                // Back to attachment point
                shape.lineTo(0, 0);
            }

            const geometry = new THREE.ShapeGeometry(shape);
            return geometry;
        }

        // Create wings
        // Wings now attach closer to body centerline for anatomical accuracy
        // Left top wing (forewing)
        const leftTopWingGeom = createRealisticWing(true);
        const leftTopWing = new THREE.Mesh(leftTopWingGeom, wingMaterial);
        leftTopWing.position.set(-0.15, 0.8, 0);  // Positioned higher on body
        leftTopWing.rotation.y = Math.PI;
        butterfly.add(leftTopWing);

        // Right top wing (forewing)
        const rightTopWingGeom = createRealisticWing(true);
        const rightTopWing = new THREE.Mesh(rightTopWingGeom, wingMaterial);
        rightTopWing.position.set(0.15, 0.8, 0);  // Positioned higher on body
        butterfly.add(rightTopWing);

        // Left bottom wing (hindwing)
        const leftBottomWingGeom = createRealisticWing(false);
        const leftBottomWing = new THREE.Mesh(leftBottomWingGeom, wingMaterial);
        leftBottomWing.position.set(-0.15, 0.5, 0);  // Slightly lower than forewing
        leftBottomWing.rotation.y = Math.PI;
        butterfly.add(leftBottomWing);

        // Right bottom wing (hindwing)
        const rightBottomWingGeom = createRealisticWing(false);
        const rightBottomWing = new THREE.Mesh(rightBottomWingGeom, wingMaterial);
        rightBottomWing.position.set(0.15, 0.5, 0);  // Slightly lower than forewing
        butterfly.add(rightBottomWing);

        // Body (rounded cylinder)
        const bodyGeometry = new THREE.CylinderGeometry(0.15, 0.12, 3, 16);
        const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
        body.castShadow = true;
        butterfly.add(body);

        // Head
        const headGeometry = new THREE.SphereGeometry(0.25, 16, 16);
        const head = new THREE.Mesh(headGeometry, bodyMaterial);
        head.position.y = 1.7;
        head.castShadow = true;
        butterfly.add(head);

        // Antennae
        const antennaGeometry = new THREE.CylinderGeometry(0.02, 0.02, 0.8, 8);

        const leftAntenna = new THREE.Mesh(antennaGeometry, bodyMaterial);
        leftAntenna.position.set(-0.15, 2.0, 0.1);
        leftAntenna.rotation.z = 0.3;
        leftAntenna.rotation.x = 0.2;
        butterfly.add(leftAntenna);

        const rightAntenna = new THREE.Mesh(antennaGeometry, bodyMaterial);
        rightAntenna.position.set(0.15, 2.0, 0.1);
        rightAntenna.rotation.z = -0.3;
        rightAntenna.rotation.x = 0.2;
        butterfly.add(rightAntenna);

        // Antenna tips
        const antennaTipGeometry = new THREE.SphereGeometry(0.05, 8, 8);

        const leftAntennaTip = new THREE.Mesh(antennaTipGeometry, bodyMaterial);
        leftAntennaTip.position.set(-0.25, 2.4, 0.2);
        butterfly.add(leftAntennaTip);

        const rightAntennaTip = new THREE.Mesh(antennaTipGeometry, bodyMaterial);
        rightAntennaTip.position.set(0.25, 2.4, 0.2);
        butterfly.add(rightAntennaTip);

        scene.add(butterfly);

        // Ground plane for reference
        const groundGeometry = new THREE.PlaneGeometry(20, 20);
        const groundMaterial = new THREE.MeshPhongMaterial({
            color: 0xd4e9f7,
            side: THREE.DoubleSide
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -2;
        ground.receiveShadow = true;
        scene.add(ground);

        // View preset functions
        window.setView = function(view) {
            controls.reset();

            switch(view) {
                case 'front':
                    camera.position.set(0, 0, 8);
                    break;
                case 'side':
                    camera.position.set(8, 0, 0);
                    break;
                case 'top':
                    camera.position.set(0, 8, 0.1);
                    break;
                case 'quarter':
                    camera.position.set(5, 3, 5);
                    break;
            }

            camera.lookAt(0, 0, 0);
            controls.update();
        };

        window.resetPosition = function() {
            camera.position.set(0, 2, 8);
            camera.lookAt(0, 0, 0);
            controls.reset();
        };

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
